<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>八字咨询工具箱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #0f3460;
            --accent: #e94560;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --border: #2a2a4a;
            --success: #4caf50;
            --warning: #ff9800;
            --tree-bg: #161b22;
            --tree-card: #1c1f26;
            --tree-accent: #e94560;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 100px;
        }

        .header {
            background: var(--bg-secondary);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 1.1rem;
            color: var(--accent);
        }

        .content {
            padding: 15px;
        }

        /* 底部导航 */
        .nav-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .nav-tab {
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-tab.active {
            background: var(--accent);
            border-color: var(--accent);
        }

        /* 话术分类 */
        .sop-section {
            margin-bottom: 25px;
        }

        .sop-title {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sop-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: var(--accent);
            border-radius: 2px;
        }

        .script-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .script-card:hover {
            border-color: var(--accent);
        }

        .script-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .script-name {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .copy-btn {
            padding: 4px 10px;
            background: var(--accent);
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 12px;
        }

        .script-content {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.6;
            white-space: pre-wrap;
        }

        /* 断语工具 */
        .tool-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
        }

        .tool-title {
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .tag {
            padding: 6px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 15px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tag.active {
            background: var(--accent);
            border-color: var(--accent);
        }

        .duanyu-result {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 12px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* 快捷输入 */
        .quick-input {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .quick-input label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .quick-input input {
            width: 100%;
            padding: 10px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        /* 弹窗 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }

        .modal.hidden {
            display: none;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            max-width: 400px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .modal-text {
            font-size: 0.9rem;
            line-height: 1.6;
            white-space: pre-wrap;
            margin-bottom: 15px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        /* 决策树专用样式 */
        #treeTab {
            padding: 0;
            height: calc(100vh - 150px);
            display: flex;
            flex-direction: column;
        }

        .tree-header {
            padding: 10px 15px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tree-tabs-container {
            display: flex;
            gap: 8px;
            gap: 8px;
            padding: 10px 15px;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
        }

        .tree-select {
            width: 100%;
            padding: 8px 12px;
            background: #252525;
            color: #fff;
            border: 1px solid var(--accent);
            border-radius: 6px;
            font-size: 14px;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23e94560' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 16px;
            cursor: pointer;
        }

        .tree-select:focus {
            outline: none;
            box-shadow: 0 0 5px rgba(233, 69, 96, 0.5);
        }

        #treeViewport {
            flex: 1;
            overflow-y: auto;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #0d1117;
        }

        .tree-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tree-level-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
            position: relative;
        }

        .tree-level-container:not(:last-child)::after {
            content: '';
            width: 1px;
            height: 25px;
            background: var(--border);
            position: absolute;
            bottom: -25px;
            left: 50%;
        }

        .tree-nodes-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }

        .tree-node-card {
            background: var(--tree-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            cursor: pointer;
            min-width: 140px;
            max-width: 280px;
            text-align: center;
            transition: all 0.2s;
        }

        .tree-node-card:hover {
            border-color: var(--accent);
        }

        .tree-node-card.active {
            background: rgba(233, 69, 96, 0.1);
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.2);
        }

        .tree-node-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--accent);
        }

        .tree-node-desc {
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .tree-advice-box {
            margin-top: 15px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
            padding: 15px;
            border-radius: 6px;
            width: 95%;
            animation: fadeIn 0.4s ease;
        }

        .tree-advice-header {
            color: var(--accent);
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .tree-advice-content {
            font-size: 13px;
            color: var(--text-primary);
            line-height: 1.6;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toast {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(76, 175, 80, 0.95);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            animation: fadeInOut 2s ease forwards;
        }

        @keyframes fadeInOut {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(10px);
            }

            15% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }

            85% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        .hidden {
            display: none !important;
        }

        .section-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin: 20px 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 3px;
            height: 16px;
            background: var(--success);
            border-radius: 2px;
        }
    </style>
    <script src="js/lunar.js"></script>
    <script src="js/year_map.js"></script>
    <script src="js/bazi_logic.js"></script>
</head>

<body>
    <div class="header">
        <h1>📿 八字咨询工具箱</h1>
    </div>

    <div class="content">
        <!-- 导航 -->
        <div class="nav-tabs">
            <div class="nav-tab active" onclick="switchTab('sop')">SOP话术</div>
            <div class="nav-tab" onclick="switchTab('duanyu')">断语工具</div>
            <div class="nav-tab" onclick="switchTab('custom')">快捷变量</div>
            <div class="nav-tab" onclick="switchTab('paipan')">查事排盘</div>
            <div class="nav-tab" onclick="switchTab('tree')">逻辑导航</div>
        </div>

        <!-- SOP话术 -->
        <div id="sopTab">
            <!-- 框架建立 -->
            <div class="sop-section">
                <div class="sop-title">第一阶段：框架建立</div>
                <div id="frameScripts"></div>
            </div>

            <!-- 信任校准 -->
            <div class="sop-section">
                <div class="sop-title">第二阶段：信任校准</div>
                <div id="calibrationScripts"></div>
            </div>

            <!-- 痛点诊断 -->
            <div class="sop-section">
                <div class="sop-title">第三阶段：痛点诊断</div>
                <div id="painScripts"></div>
            </div>

            <!-- 风水神断 -->
            <div class="sop-section">
                <div class="sop-title">第四阶段：风水神断</div>
                <div id="fengshuiScripts"></div>
            </div>

            <!-- 转化收网 -->
            <div class="sop-section">
                <div class="sop-title">第五阶段：转化收网</div>
                <div id="closingScripts"></div>
            </div>

            <!-- 异常处理 -->
            <div class="sop-section">
                <div class="sop-title">异常处理</div>
                <div id="errorScripts"></div>
            </div>
        </div>

        <!-- 断语工具 -->
        <div id="duanyuTab" class="hidden">
            <div class="section-title">断语匹配</div>

            <div class="tool-card">
                <div class="tool-title">日支（夫妻宫）</div>
                <div class="tag-group" id="rizhiTags"></div>
            </div>

            <div class="tool-card">
                <div class="tool-title">财星特征</div>
                <div class="tag-group" id="wealthTags"></div>
            </div>

            <div class="tool-card">
                <div class="tool-title">官星特征</div>
                <div class="tag-group" id="officialTags"></div>
            </div>

            <div class="tool-card">
                <div class="tool-title">日主强弱</div>
                <div class="tag-group" id="strengthTags"></div>
            </div>

            <div class="section-title">匹配结果</div>
            <div class="duanyu-result" id="duanyuResult">
                选择条件，自动显示匹配断语
            </div>
        </div>

        <!-- 快捷变量 -->
        <div id="customTab" class="hidden">
            <div class="section-title">变量设置</div>

            <div class="quick-input">
                <label>来访者姓名</label>
                <input type="text" id="varName" placeholder="输入姓名">
            </div>

            <div class="quick-input">
                <label>年份</label>
                <input type="text" id="varYear" placeholder="如：2024、2025">
            </div>

            <div class="quick-input">
                <label>金额</label>
                <input type="text" id="varAmount" placeholder="如：30万、100万">
            </div>

            <div class="quick-input">
                <label>家人称呼</label>
                <input type="text" id="varPerson" placeholder="如：父亲、丈夫、客户">
            </div>

            <div class="section-title">快速复制</div>
            <div id="customScripts"></div>
        </div>

        <!-- 八字排盘 -->
        <div id="paipanTab" class="hidden">
            <div class="section-title">排盘计算</div>
            <div class="tool-card">
                <div class="tool-title">基本信息录入</div>
                <div class="quick-input">
                    <label>阳历日期</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="number" id="pp-year" value="2000" style="width: 70px; padding: 8px;">
                        <select id="pp-month"
                            style="width: 60px; padding: 8px; background: var(--bg-primary); color: #fff; border: 1px solid var(--border); border-radius: 4px;"></select>
                        <select id="pp-day"
                            style="width: 60px; padding: 8px; background: var(--bg-primary); color: #fff; border: 1px solid var(--border); border-radius: 4px;"></select>
                        <select id="pp-hour"
                            style="width: 80px; padding: 8px; background: var(--bg-primary); color: #fff; border: 1px solid var(--border); border-radius: 4px;"></select>
                    </div>
                    <div style="margin-top: 10px;">
                        <label style="display: inline-flex; align-items: center; gap: 5px;">
                            <input type="checkbox" id="pp-unknown-hour"> 时辰未知
                        </label>
                    </div>
                </div>
                <div class="quick-input">
                    <label>性别</label>
                    <select id="pp-gender"
                        style="width: 100%; padding: 10px; background: var(--bg-primary); color: #fff; border: 1px solid var(--border); border-radius: 6px;">
                        <option value="1">男</option>
                        <option value="0">女</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="doCalculate()"
                    style="width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 6px; font-size: 1rem; margin-top: 10px;">开始排盘</button>
            </div>

            <div id="pp-result-container" class="hidden" style="margin-top: 20px;">
                <div class="tool-card">
                    <div class="tool-title">四柱八字</div>
                    <div id="pp-bazi-grid"
                        style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; text-align: center; margin-bottom: 15px;">
                        <!-- JS Generated -->
                    </div>
                </div>

                <div class="tool-card">
                    <div class="tool-title">身强与用神</div>
                    <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px;">
                        <div style="margin-bottom: 10px;">
                            <span style="color: var(--text-secondary);">身强判定：</span>
                            <span id="pp-strength-val"
                                style="font-size: 1.2rem; font-weight: bold; color: #ffd700;"></span>
                        </div>
                        <div style="margin-bottom: 10px;">
                            <span style="color: var(--text-secondary);">喜用神：</span>
                            <span id="pp-yong-val" style="color: var(--success); font-weight: bold;"></span>
                        </div>
                        <div style="margin-bottom: 10px;">
                            <span style="color: var(--text-secondary);">忌神：</span>
                            <span id="pp-ji-val" style="color: var(--accent);"></span>
                        </div>
                        <div style="font-size: 0.85rem; color: #aaa; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;"
                            id="pp-reason"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 决策树逻辑导航 -->
        <div id="treeTab" class="hidden">
            <div class="tree-header">
                <div style="font-size: 0.9rem; font-weight: bold; color: var(--accent);">逻辑推演树</div>
                <button class="copy-btn" style="background:transparent; border:1px solid var(--border);"
                    onclick="TreeViewer.reset()">重置</button>
            </div>
            <div class="tree-tabs-container" id="treeTabBar">
                <!-- 动态生成 -->
            </div>
            <div id="treeViewport">
                <div id="treeDisplay" class="tree-container"></div>
            </div>
        </div>
    </div>

    <!-- 话术弹窗 -->
    <div class="modal hidden" id="scriptModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-text" id="modalText"></div>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="copyModal()">复制话术</button>
                <button class="btn btn-secondary" onclick="closeModal()">关闭</button>
            </div>
        </div>
    </div>

    <script>
        // ============ 配置区域（从这里开始编辑）============
        // 话术格式：{ name: '名称', content: '内容' }
        // 断语格式：{ value: '标签', text: '断语文本' }

        const sopScripts = {
            // ================== 场景1：用户表示“对/准/是这样” ==================
            // 策略：理所当然 + 引入危机 (Yes, and...)
            agree: [
                { name: '承接-深入挖掘', content: '这都在意料之中。既然这一点验证了，那盘面上显示的另一个关于[下个话题]的隐患，我就必须得直说了。' },
                { name: '承接-因果关联', content: '不仅如此，这其实只是表象。如果你仔细体会，会发现它直接导致了你的[下个话题]出现了问题。这是一环扣一环的。' },
                { name: '承接-转折打击', content: '准是正常的，因为局就在这摆着。但你不要觉得这是好事，虽然你现在[用户现状]，但从运势走向看，马上就会面临[下个危机]。' },
                { name: '承接-强调严重性', content: '这一点对上了，说明你的“气”现在正在应验期。那你就要特别小心了，因为接下来的这个象义，通常是跟着一起来的：[下个断语]。' },
                { name: '承接-赞赏后抑', content: '嗯，说明你对自己的感知还是很敏锐的。很多人当局者迷，你是清醒的。但越是清醒，越应该能感觉到：[下个焦虑点]。' }
            ],

            // ================== 场景2：用户表示“不对/没有/不像” ==================
            // 策略：重新定义 + 强调隐患 (No, because...)
            disagree: [
                { name: '反转-隐性潜伏', content: '现在看不出来是正常的。因为这是“骨子里的气”，它平时是潜伏的，只在关键时刻爆发。这反而更危险，因为它是[下个风险]的根源。' },
                { name: '反转-未来时', content: '你现在觉得没有，是因为流年还没引动它。就像埋在地下的种子，你看不见不代表它不存在。等到[某年份/时机]一到，如果不提前干预，它很可能会演变成[下个后果]。' },
                { name: '反转-祖荫化解', content: '嗯，那说明你后天修得不错，或者家里长辈积了德，帮你在无形中挡了一下。这是万幸。但是，挡得了初一挡不了十五，这个局如果不破，还是会影响到你的[下个方面]。' },
                { name: '反转-重新定义', content: '外表的[用户反驳点]不代表命里的[命理特征]。我讲的是你的本源能量。这种能量如果换一种方式释放，就会变成[另一种解释]。你自己品一下。' },
                { name: '反转-各执一词', content: '命理看到的是本质，感官看到的是表象。很多缘主一开始也觉得不对，等过了一两年再回来看，才发现早已身在局中。我不希望你也是那时候才后悔。' }
            ],

                { name: '打压-因小失大', content: '你现在纠结的这一点点[钱/时间]，和你未来可能面临的[巨大损失]相比，根本不值一提。眼光要放长远点，不要盯着芝麻丢了西瓜。' },
                { name: '打压-暂停服务', content: '我看你现在气场很乱，充满了怀疑。这样的状态，我也没法跟你产生感应。不如今天先这样，等你什么时候心静了，信了，咱们再谈。' }
            ],

            // ================== 场景4：用户“废话多/沉默/不知道” ==================
            // 策略：总结定性 + 强行推进 (Summarize, next...)
            passive: [
                { name: '推进-一语定性', content: '这些细节其实都是表象，核心的问题在于你的气场被[某种因素]卡住了。我们不需要纠结过去，关键是看接下来怎么走。' },
                { name: '推进-忽略细节', content: '嗯，这都是过程。在命理上看，结果才是定数。而你现在的定数显示，最大的问题其实是在[下个话题]上。' },
                { name: '推进-强行引导', content: '这个我们稍后再细说。现在的当务之急，是你的[核心问题]已经显像了。如果不重视，前面说的那些都会白费。' },
                { name: '推进-唤醒关注', content: '你说的这些我都理解。但你有没有想过，为什么你总是遇到这类问题？根源不在别人，而在你自己的局里。看这里...[下个断语]。' }
            ],

            // ================== 场景5：通用开场 (冷读建立) ==================
            opener: [
                { name: '性格-外刚内柔', content: '我看你的盘，第一感觉是：你给人的外在印象是很坚强、独立的，甚至有点“高冷”，但实际上你内心非常柔软，而且很重感情。属于“刀子嘴豆腐心”。只有真正懂你的人，才知道你背负了多少。是不是这样？' },
                { name: '性格-智者多虑', content: '你是个极其聪明的人，看问题比别人深。但是，你的“慧”也伤了你的“神”。最近两三年，你总是想得太多，晚上容易失眠多梦，脑子停不下来。这就是“神伤”的表现。对不对？' },
                { name: '性格-付出型', content: '你是个典型的“付出型”。操心最多的是你，照顾所有人的是你，但唯独被忽略的也是你。你心里其实挺委屈的，觉得周围人都不太懂你的苦心。我说得准吗？' },
                { name: '性格-直觉型', content: '你的“第六感”特别准。很多事刚有苗头你心里就有数了。你看人很准，但以前常因心软，明知对方有问题还选择相信，结果吃亏。是不是？' }
            ]
        };

        // 断语库
        const duanyuData = {
            rizhi: [
                { value: '子', text: '配偶性格温和，但有时缺乏主见，需要你多拿主意' },
                { value: '丑', text: '配偶务实顾家，但有时脾气倔强，需要多包容' },
                { value: '寅', text: '配偶有上进心，事业心强，但有时忙得顾不上家' },
                { value: '卯', text: '配偶温顺感性，有艺术气质，但有时情绪化' },
                { value: '辰', text: '配偶稳重踏实，有责任感，但有时比较古板' },
                { value: '巳', text: '配偶聪明伶俐，善于沟通，但有时想法多变' },
                { value: '午', text: '配偶热情大方，有魅力，但有时脾气急躁' },
                { value: '未', text: '配偶温和宽厚，善于持家，但有时比较慢热' },
                { value: '申', text: '配偶精明能干，执行力强，但有时过于理性' },
                { value: '酉', text: '配偶注重品质，有审美，但有时过于讲究' },
                { value: '戌', text: '配偶正直可靠，有原则，但有时过于固执' },
                { value: '亥', text: '配偶善良体贴，善解人意，但有时想太多' }
            ],
            wealth: [
                { value: '财多', text: '财星旺，财运不错，但需结合日主强弱判断能否担住' },
                { value: '财弱', text: '正财运一般，需要靠技能或副业来补' },
                { value: '无财', text: '原局无财，正财运势较弱，或来得晚' },
                { value: '入库', text: '财入库，说明财运被锁住，需要打开才能显现' }
            ],
            official: [
                { value: '官旺', text: '官星旺，说明有管理能力，适合体制内或做管理' },
                { value: '官弱', text: '事业上贵人运不足，需要自己多努力' },
                { value: '无官', text: '不太适合体制内，或事业上缺少官方背景' },
                { value: '混杂', text: '官杀混杂，做事前要理清思路，不要摇摆不定' }
            ],
            strength: [
                { value: '强', text: '身强能担财官，底子好，不容易生病' },
                { value: '弱', text: '身弱要注意脾胃和气血，赚了容易花掉' }
            ]
        };

        // 快捷话术
        const customScripts = [
            { name: '小网兜隐喻', content: '这就像你手里是个小网兜，见到一百条鱼，你会开心，但也会焦虑网兜破了鱼跑了。这就是你现在的"身弱不担财"。' },
            { name: '换大网兜', content: '既然是身弱不担财，就需要风水布局来"换个大网兜"。' },
            { name: '近期预言', content: '明后两天你会谈关于"财"的事，且有男性参与。' }
        ];
        // ============ 配置区域结束 ============

        // ============ 渲染SOP话术 ============
        function renderSopScripts() {
            // 定义显示顺序和标题
            const sections = [
                { key: 'opener', title: '【开场】冷读建立' },
                { key: 'agree', title: '【承接】用户说“对”' },
                { key: 'disagree', title: '【反转】用户说“不对”' },
                { key: 'anxious', title: '【控场】用户急躁/质疑' },
                { key: 'passive', title: '【推进】用户废话/沉默' }
            ];

            const container = document.getElementById('sopTab');
            container.innerHTML = sections.map(sec => {
                const scripts = sopScripts[sec.key];
                if (!scripts) return '';

                return `
                    <div class="sop-section">
                        <div class="sop-title">${sec.title}</div>
                        ${scripts.map(script => `
                            <div class="script-card" onclick="showScript('${script.name}', '${escapeHtml(script.content)}')">
                                <div class="script-header">
                                    <span class="script-name">${script.name}</span>
                                    <button class="copy-btn" onclick="event.stopPropagation(); copyText('${escapeHtml(script.content)}')">复制</button>
                                </div>
                                <div class="script-content">${script.content.substring(0, 60)}...</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }).join('');
        }

        // ============ 渲染断语标签 ============
        function renderDuanyuTags() {
            Object.entries(duanyuData).forEach(([key, items]) => {
                const container = document.getElementById(key + 'Tags');
                if (container) {
                    container.innerHTML = items.map(item => `
                        <div class="tag" data-key="${key}" data-value="${item.value}" onclick="selectDuanyu(this)">${item.value}</div>
                    `).join('');
                }
            });
        }

        // 选择断语条件
        function selectDuanyu(el) {
            el.classList.toggle('active');
            updateDuanyuResult();
        }

        // 更新断语结果
        function updateDuanyuResult() {
            const results = [];
            const activeTags = document.querySelectorAll('.tag.active');

            activeTags.forEach(tag => {
                const key = tag.dataset.key;
                const value = tag.dataset.value;
                const item = duanyuData[key].find(i => i.value === value);
                if (item) {
                    results.push(item.text);
                }
            });

            const resultDiv = document.getElementById('duanyuResult');
            if (results.length > 0) {
                resultDiv.textContent = results.join('\n');
            } else {
                resultDiv.textContent = '选择条件，自动显示匹配断语';
            }
        }

        // ============ 渲染自定义话术 ============
        function renderCustomScripts() {
            const container = document.getElementById('customScripts');
            if (container) {
                container.innerHTML = customScripts.map(script => `
                    <div class="script-card" onclick="showScript('${script.name}', '${escapeHtml(script.content)}')">
                        <div class="script-header">
                            <span class="script-name">${script.name}</span>
                            <button class="copy-btn" onclick="event.stopPropagation(); copyText('${escapeHtml(script.content)}')">复制</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        // ============ 切换标签 ============
        function switchTab(tab) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            // Find the tab that matches the tab id
            const targetTab = Array.from(document.querySelectorAll('.nav-tab')).find(el => {
                const onclick = el.getAttribute('onclick');
                return onclick && onclick.includes(`'${tab}'`);
            });
            if (targetTab) targetTab.classList.add('active');

            document.getElementById('sopTab').classList.add('hidden');
            document.getElementById('duanyuTab').classList.add('hidden');
            document.getElementById('customTab').classList.add('hidden');
            document.getElementById('paipanTab').classList.add('hidden');
            document.getElementById('treeTab').classList.add('hidden');
            document.getElementById(tab + 'Tab').classList.remove('hidden');

            if (tab === 'tree' && !window.TreeViewerInitialized) {
                TreeViewer.init();
                window.TreeViewerInitialized = true;
            }
        }

        // ============ 显示话术弹窗 ============
        function showScript(name, content) {
            content = unescapeHtml(content);
            document.getElementById('modalTitle').textContent = name;
            document.getElementById('modalText').textContent = content;
            document.getElementById('scriptModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('scriptModal').classList.add('hidden');
        }

        // ============ 复制功能 ============
        function copyText(text) {
            text = unescapeHtml(text);
            // 替换变量
            text = text.replace('[年份]', document.getElementById('varYear').value || '[年份]');
            text = text.replace('[金额]', document.getElementById('varAmount').value || '[金额]');
            text = text.replace('[姓名]', document.getElementById('varName').value || '');
            text = text.replace('[某具体事件]', '');

            navigator.clipboard.writeText(text).then(() => {
                showToast('已复制到剪贴板');
            });
        }

        function copyModal() {
            const text = document.getElementById('modalText').textContent;
            copyText(escapeHtml(text));
            closeModal();
        }

        // ============ 工具函数 ============
        function escapeHtml(text) {
            return text.replace(/'/g, "\\'").replace(/\n/g, '\\n');
        }

        function unescapeHtml(text) {
            return text.replace(/\\n/g, '\n').replace(/\\'/g, "'");
        }

        function showToast(msg) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // ============ 初始化 ============
        function init() {
            renderSopScripts();
            renderDuanyuTags();
            renderCustomScripts();
            initPaiPan();
        }

        // ============ 排盘逻辑 ============
        function initPaiPan() {
            // Fill Selects
            const mM = document.getElementById('pp-month');
            const dD = document.getElementById('pp-day');
            const hH = document.getElementById('pp-hour');

            if (!mM || !dD || !hH) return;

            for (let i = 1; i <= 12; i++) mM.add(new Option(i + '月', i));
            for (let i = 1; i <= 31; i++) dD.add(new Option(i + '日', i));

            // Hours
            const zhi = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
            for (let i = 0; i < 24; i++) {
                const z = zhi[Math.floor((i + 1) % 24 / 2)];
                hH.add(new Option(i + ':00 (' + z + '时)', i));
            }

            // Set default date
            const now = new Date();
            const yE = document.getElementById('pp-year');
            if (yE) yE.value = now.getFullYear();
            mM.value = now.getMonth() + 1;
            dD.value = now.getDate();
            hH.value = now.getHours();
        }

        function doCalculate() {
            const year = parseInt(document.getElementById('pp-year').value);
            const month = parseInt(document.getElementById('pp-month').value);
            const day = parseInt(document.getElementById('pp-day').value);
            const hour = parseInt(document.getElementById('pp-hour').value);
            const unknown = document.getElementById('pp-unknown-hour').checked;
            const gender = document.getElementById('pp-gender').value; // 1=Male, 0=Female

            const date = new Date(year, month - 1, day, hour);

            // Call Logic (exposed via window/global)
            if (typeof calculateBazi !== 'function') {
                alert('核心算法未加载，请刷新页面');
                return;
            }

            try {
                const data = calculateBazi(date, gender, null, unknown);
                if (!data) {
                    alert('排盘失败');
                    return;
                }
                renderPaiPanResult(data);
            } catch (e) {
                console.error(e);
                alert('计算出错: ' + e.message);
            }
        }

        function renderPaiPanResult(data) {
            document.getElementById('pp-result-container').classList.remove('hidden');

            // Render Pillars
            const grid = document.getElementById('pp-bazi-grid');
            const headers = ['年柱', '月柱', '日柱', '时柱'];
            // pillars index: 0=Year, 1=Month, 2=Day, 3=Hour
            let html = '';
            // Headers
            headers.forEach(h => html += `<div style="color:var(--text-secondary); font-size:0.8rem;">${h}</div>`);

            // Gan
            data.processedPillars.forEach(p => {
                const color = getElemColor(GAN_WX[p.gan]);
                html += `<div style="font-size:1.2rem; font-weight:bold; color:${color}">${p.gan}</div>`;
            });

            // Zhi
            data.processedPillars.forEach(p => {
                const color = getElemColor(ZHI_WX[p.zhi]);
                html += `<div style="font-size:1.2rem; font-weight:bold; color:${color}">${p.zhi}</div>`;
            });

            // Ten God (Hidden)
            data.processedPillars.forEach(p => {
                html += `<div style="font-size:0.7rem; color:#aaa;">${p.tenGod}</div>`;
            });

            grid.innerHTML = html;

            // Calculated Body Strength
            const pillars = data.processedPillars;
            const bs = calculateBodyStrength(pillars);

            document.getElementById('pp-strength-val').textContent = bs.level + ` (得分:${Math.round(bs.totalScore)})`;

            // Yong Shen
            const yong = calculateYongXiJi(pillars, bs);
            document.getElementById('pp-yong-val').textContent = yong.yong + (yong.xi ? '、' + yong.xi : '');
            document.getElementById('pp-ji-val').textContent = yong.ji;
            document.getElementById('pp-reason').textContent = yong.reason + (yong.mode ? ` [${yong.mode}]` : '');
        }

        // Helper for colors
        const GAN_WX = {
            '甲': '木', '乙': '木', '丙': '火', '丁': '火', '戊': '土',
            '己': '土', '庚': '金', '辛': '金', '壬': '水', '癸': '水'
        };
        const ZHI_WX = {
            '子': '水', '丑': '土', '寅': '木', '卯': '木', '辰': '土', '巳': '火',
            '午': '火', '未': '土', '申': '金', '酉': '金', '戌': '土', '亥': '水'
        };
        function getElemColor(wx) {
            if (wx === '木') return '#4CAF50';
            if (wx === '火') return '#FF5722';
            if (wx === '土') return '#795548';
            if (wx === '金') return '#FFC107';
            if (wx === '水') return '#2196F3';
            return '#fff';
        }

        init();
    </script>
