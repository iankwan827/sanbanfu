  document.getElementById('timeDisplay').textContent = fmt(t) + " / " + fmt(totalDur);
}

function showSec(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  var sec = document.getElementById('sec-' + id);
  if (sec) sec.classList.add('active');
  document.getElementById('curSection').textContent = '当前：' + id;
}

function clearAll() {
  document.querySelectorAll('.pillar-box').forEach(p => p.classList.remove('active'));
  document.getElementById('yongshen').classList.remove('active');
  document.getElementById('jishen').classList.remove('active');
  document.querySelectorAll('.char').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.wealth').forEach(w => w.classList.remove('active'));
  document.querySelectorAll('.dayun').forEach(d => d.classList.remove('active'));
  document.getElementById('marriageBox').classList.remove('active');
  document.getElementById('wuxingFlow').classList.remove('active');
  document.getElementById('wuxingStatus').classList.remove('active');
  document.getElementById('wx1').className = 'wx-item';
  document.getElementById('wx2').className = 'wx-item';
  document.getElementById('wxArrow').textContent = '';
  document.querySelectorAll('.wx-status-item').forEach(w => w.classList.remove('active'));
}

// 五行生克动画
var wuxingMap = {
  'mu': '木', 'huo': '火', 'tu': '土', 'jin': '金', 'shui': '水'
};

function showWuxingFlow(from, to, type) {
  var flow = document.getElementById('wuxingFlow');
  var wx1 = document.getElementById('wx1');
  var wx2 = document.getElementById('wx2');
  var arrow = document.getElementById('wxArrow');

  wx1.className = 'wx-item ' + from;
  wx2.className = 'wx-item ' + to;
  wx1.textContent = wuxingMap[from];
  wx2.textContent = wuxingMap[to];

  if (type === 'sheng') {
    arrow.textContent = '→'; // 相生
    wx1.classList.add('flowing');
    wx2.classList.remove('flowing-reverse');
  } else if (type === 'ke') {
    arrow.textContent = '⊘'; // 相克
    wx1.classList.add('flowing');
    wx2.classList.remove('flowing-reverse');
  }

  flow.classList.add('active');
}

// 旺相休囚死动画（戌月）
function showWuxingStatus() {
  var status = document.getElementById('wuxingStatus');
  status.classList.add('active');

  // 戌月：土旺、金相、火休、木囚、水死
  var items = ['wx-mu', 'wx-huo', 'wx-tu', 'wx-jin', 'wx-shui'];
  var classes = ['qiu', 'xiu', 'wang', 'xiang', 'si'];

  // 依次高亮显示
  items.forEach(function(id, i) {
    setTimeout(function() {
      var el = document.getElementById(id);
      el.className = 'wx-status-item ' + ['mu','huo','tu','jin','shui'][i] + ' ' + classes[i] + ' active';
    }, i * 400);
  });
}

function process(h) {
  clearAll();
  if (!h) { showSec('bazi'); return; }

  // 柱子高亮映射 - 分开天干地支
  var pm = {
    // 整个柱子
    'year': ['p-year-gan','p-year-zhi'],
    'month': ['p-month-gan','p-month-zhi'],
    'day': ['p-day-gan','p-day-zhi'],
    'hour': ['p-hour-gan','p-hour-zhi'],
    // 只有天干
    'year_gan': 'p-year-gan',
    'month_gan': 'p-month-gan',
    'day_gan': 'p-day-gan',
    'hour_gan': 'p-hour-gan',
    // 只有地支
    'year_zhi': 'p-year-zhi',
    'month_zhi': 'p-month-zhi',
    'day_zhi': 'p-day-zhi',
    'hour_zhi': 'p-hour-zhi',
    // 丑戌相刑（年支丑 + 月支戌）
    'chou_xu': ['p-year-zhi', 'p-month-zhi'],
    // 年月同时
    'year-month': ['p-year-gan','p-year-zhi','p-month-gan','p-month-zhi'],
    // 全部
    'all': ['p-year-gan','p-year-zhi','p-month-gan','p-month-zhi','p-day-gan','p-day-zhi','p-hour-gan','p-hour-zhi']
  };

  if (pm[h]) {
    var arr = Array.isArray(pm[h]) ? pm[h] : [pm[h]];
    arr.forEach(function(id) {
      var el = document.getElementById(id);
      if(el) el.classList.add('active');
    });
  }

  if (h === 'yongshen') { showSec('bazi'); document.getElementById('yongshen').classList.add('active'); }
  if (h === 'jishen') { showSec('bazi'); document.getElementById('jishen').classList.add('active'); }

  // 戌月得令 - 显示旺相休囚死
  if (h === 'month_zhi') {
    showSec('bazi');
    showWuxingStatus();
    document.getElementById('p-month-zhi').classList.add('active');
    return;
  }

  // 五行生克动画触发（同时高亮对应柱子）
  if (h === 'mu_sheng_huo') {
    // 先显示八字区，再添加动画和高亮
    showSec('bazi');
    setTimeout(function() {
      showWuxingFlow('mu', 'huo', 'sheng');
      document.getElementById('p-year-gan').classList.add('active');
      document.getElementById('p-month-gan').classList.add('active');
    }, 50);
    return;
  } // 木生火
  if (h === 'huo_sheng_tu') {
    showSec('bazi');
    setTimeout(function() {
      showWuxingFlow('huo', 'tu', 'sheng');
      document.getElementById('p-month-gan').classList.add('active');
      document.getElementById('p-day-gan').classList.add('active');
    }, 50);
    return;
  } // 火生土
  if (h === 'tu_ke_shui') { showSec('bazi'); showWuxingFlow('tu', 'shui', 'ke'); } // 土克水
  if (h === 'shui_ke_huo') { showSec('bazi'); showWuxingFlow('shui', 'huo', 'ke'); } // 水克火
  if (h === 'strength') showSec('bazi');
  if (h === 'character') {
    showSec('character');
    setTimeout(function(){document.getElementById('char1').classList.add('active');},200);
    setTimeout(function(){document.getElementById('char2').classList.add('active');},500);
    setTimeout(function(){document.getElementById('char3').classList.add('active');},800);
    setTimeout(function(){document.getElementById('char4').classList.add('active');},1100);
  }
  if (h === 'wealth') { showSec('wealth'); document.querySelectorAll('.wealth').forEach(function(w){w.classList.add('active');}); }
  if (h === 'dayun1') { showSec('dayun'); document.getElementById('d1').classList.add('active'); }
  if (h === 'dayun2') { showSec('dayun'); document.getElementById('d2').classList.add('active'); }
  if (h === 'dayun3') { showSec('dayun'); document.getElementById('d3').classList.add('active'); }
  if (h === 'marriage') { showSec('marriage'); document.getElementById('marriageBox').classList.add('active'); }
}

// 语音合成 - 队列模式
function speakQueue(txt, callback) {
  if (!window.speechSynthesis) {
    if (callback) callback();
    return;
  }

  // 先停止当前语音
  window.speechSynthesis.cancel();

  var utt = new SpeechSynthesisUtterance(txt);
  utt.lang = 'zh-CN';
  utt.rate = 0.85; // 放慢一点

  utt.onend = function() {
    isSpeaking = false;
    if (callback) callback();
  };

  utt.onerror = function(e) {
    console.log("语音错误:", e.error);
    isSpeaking = false;
    if (callback) callback();
  };

  isSpeaking = true;
  window.speechSynthesis.speak(utt);
}

function start() {
  if (playing) return;
  playing = true;
  document.getElementById('playBtn').textContent = "暂停";
  var elapsed = 0;
  var currentIndex = 0;

  function playNext() {
    if (!playing || currentIndex >= script.length) {
      stop();
      return;
    }

    var cur = script[currentIndex];

    // 更新文字和动画
    document.getElementById('textContent').textContent = cur.txt;
    process(cur.h);

    // 播放语音，等待完成后再继续
    speakQueue(cur.txt, function() {
      currentIndex++;
      elapsed = cur.t + cur.d;
      upProg(elapsed);

      if (elapsed >= totalDur) {
        stop();
        return;
      }

      // 继续下一段
      playNext();
    });
  }

  playNext();
}

function stop() {
  playing = false;
  if (window.speechSynthesis) {
    window.speechSynthesis.cancel();
  }
  isSpeaking = false;
  document.getElementById('playBtn').textContent = "播放";
}

function togglePlay() {
  if (playing) stop(); else start();
}

function resetVideo() {
  stop();
  upProg(0);
  document.getElementById('textContent').textContent = '点击"播放"开始';
  clearAll();
  showSec('bazi');
}
</script>
