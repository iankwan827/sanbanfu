<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>八字大师·智断终端</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --panel-bg: #1a1a1a;
            --accent-gold: #c5a059;
            --text-main: #e0e0e0;
            --text-dim: #888;
            --bubble-ai: #2a2a2a;
            --bubble-user: #c5a059;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar - Bazi Info */
        .sidebar {
            width: 320px;
            background-color: var(--panel-bg);
            border-right: 1px solid #333;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .master-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--accent-gold);
            margin: 0 auto 10px;
            background: linear-gradient(135deg, #333, #000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .status-card {
            background-color: #252525;
            padding: 15px;
            border-radius: 12px;
            font-size: 14px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .status-label {
            color: var(--text-dim);
        }

        .status-value {
            color: var(--accent-gold);
            font-weight: bold;
        }

        /* Main Chat Area */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-header {
            padding: 20px 40px;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-messages {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .message {
            margin-bottom: 24px;
            max-width: 80%;
            line-height: 1.6;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-ai {
            align-self: flex-start;
        }

        .bubble {
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 16px;
        }

        .message-ai .bubble {
            background-color: var(--bubble-ai);
            border-bottom-left-radius: 4px;
        }

        .message-user {
            align-self: flex-end;
            margin-left: auto;
        }

        .message-user .bubble {
            background-color: var(--bubble-user);
            color: #000;
            font-weight: 500;
            border-bottom-right-radius: 4px;
        }

        /* Input Area */
        .input-area {
            padding: 24px 40px;
            background-color: var(--bg-color);
            border-top: 1px solid #333;
            display: flex;
            gap: 15px;
        }

        input {
            flex: 1;
            background-color: #252525;
            border: 1px solid #333;
            border-radius: 30px;
            padding: 12px 24px;
            color: #fff;
            outline: none;
            font-size: 16px;
        }

        input:focus {
            border-color: var(--accent-gold);
        }

        button {
            background-color: var(--accent-gold);
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="master-avatar">🧙‍♂️</div>
        <h2 style="text-align: center; color: var(--accent-gold); margin-top: 0;">八字导师</h2>
        <p style="font-size: 12px; color: var(--text-dim); text-align: center;">“每一个命局都是一卷未开的经书。”</p>

        <div class="status-card">
            <h3 style="margin-top: 0; font-size: 14px;">当前状态</h3>
            <div class="status-item">
                <span class="status-label">当前阶段</span>
                <span id="state-step" class="status-value">开始校准</span>
            </div>
            <div class="status-item">
                <span class="status-label">人设信任度</span>
                <span id="state-trust" class="status-value">0%</span>
            </div>
            <div class="status-item">
                <span class="status-label">身价识别</span>
                <span id="state-wealth" class="status-value">未知</span>
            </div>
        </div>

        <div class="status-card" id="bazi-info-panel" style="display:none;">
            <h3 style="margin-top: 0; font-size: 14px;">八字原局</h3>
            <p id="bazi-pillars"
                style="font-size: 18px; color: var(--accent-gold); letter-spacing: 4px; text-align: center; font-family:serif;">
            </p>
        </div>

        <button onclick="resetSession()"
            style="width: 100%; background: transparent; color: var(--text-dim); border: 1px solid #333; margin-top: auto;">重置对话</button>
    </div>

    <div class="chat-container">
        <!-- Birthday Input Overlay -->
        <div id="birthday-overlay"
            style="position: absolute; top:0; left:0; width:100%; height:100%; background: var(--bg-color); z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px;">
            <h2 style="color: var(--accent-gold);">大师，请录入咨询者的生辰</h2>
            <div style="display: flex; flex-direction: column; gap: 15px; width: 300px;">
                <input type="datetime-local" id="birth-date" style="width: 100%;">
                <select id="gender"
                    style="background: #252525; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 30px;">
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
                <select id="is-lunar"
                    style="background: #252525; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 30px;">
                    <option value="false">公历 (阳历)</option>
                    <option value="true">农历 (阴历)</option>
                </select>
                <button onclick="startSession()" style="margin-top: 10px;">开始推演</button>
            </div>
        </div>

        <div class="chat-header">
            <div>
                <span style="font-weight: bold;">八字实战推演中</span>
                <span style="color: var(--text-dim); font-size: 12px; margin-left: 10px;">• 实时同步 headless 核心逻辑</span>
            </div>
        </div>

        <div class="chat-messages" id="chat-box">
            <!-- Messages go here -->
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="输入客户的原词贴回（如：我家确实有矿）..." onkeypress="handleKey(event)">
            <button onclick="sendMessage()">咨询大师</button>
        </div>
    </div>

    <script>
        let state = { step: 'calibration', trust: 0, wealth: 'unknown' };
        let userParams = { date: '', gender: '男', isLunar: false };

        function addMessage(text, role) {
            const chatBox = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `message message-${role}`;
            div.innerHTML = `<div class="bubble">${text}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function analyze(feedback = null) {
            // Show loading
            const chatBox = document.getElementById('chat-box');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message message-ai';
            loadingDiv.id = 'loading-msg';
            loadingDiv.innerHTML = '<div class="bubble">大师正在推演...</div>';
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...userParams, feedback, state })
                });
                const data = await res.json();

                // Remove loading
                const loading = document.getElementById('loading-msg');
                if (loading) loading.remove();

                if (data.status === 'success') {
                    state = data.updated_state;
                    updateUI(data);
                    addMessage(data.content, 'ai');
                } else if (data.status === 'need_more_info') {
                    addMessage(data.validation.guide, 'ai');
                }
            } catch (e) {
                const loading = document.getElementById('loading-msg');
                if (loading) loading.remove();
                addMessage('系统出错: ' + e.message, 'ai');
            }
        }

        function updateUI(data) {
            document.getElementById('state-step').innerText = state.step === 'complete' ? '推演完成' : state.step;
            document.getElementById('state-trust').innerText = state.trust + '%';
            document.getElementById('state-wealth').innerText = state.wealth === 'high' ? '高净值 (矿/厂)' : '常规分析';

            if (data.basic) {
                document.getElementById('bazi-info-panel').style.display = 'block';
                document.getElementById('bazi-pillars').innerText = data.basic.pillars;
            }
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';
            analyze(text);
        }

        function handleKey(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function resetSession() {
            location.reload();
        }

        function startSession() {
            const dateInput = document.getElementById('birth-date').value;
            if (!dateInput) {
                alert("大师，请先输入生辰日期");
                return;
            }

            userParams.date = dateInput.replace('T', ' ');
            userParams.gender = document.getElementById('gender').value;
            userParams.isLunar = document.getElementById('is-lunar').value === 'true';

            document.getElementById('birthday-overlay').style.display = 'none';
            addMessage("道友请了。所谓‘命里有时终须有，命里无时莫强求’。由于你的生日信息已经录入，我的推演已经开始了。", 'ai');
            setTimeout(() => analyze(), 1000);
        }
    </script>

</body>

</html>
